<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Offshore Business Experts | VJC India</title>
    
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/animations.css">

    <script
        type="text/javascript"
        src="https://assets.apollo.io/js/meetings/meetings-widget.js"
        defer
    ></script>
</head>

<body class="scroll-smooth mx-auto leading-normal">
    
    <main class="bg-darkBlue">
        <section class="sm:pt-[15svh] sm:pb-[7svh] sm:px-[6svw] w-full mx-auto py-10 px-2">
            <div id="enquiry-form" class="w-full py-12 sm:py-16 scroll-mt-20">
                <div class="max-w-3xl mx-auto px-6 text-left">
                    <div class="bg-white rounded-3xl p-8 sm:p-12 border border-darkGreen/20 shadow-[0_15px_40px_rgba(1,55,125,0.05)] relative">
                        
                        <form id="vjc-apollo-enquiry-form" class="space-y-5">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                <div class="flex flex-col gap-1.5">
                                    <label for="input-fullname" class="text-xs font-bold uppercase tracking-wider text-darkBlue/80">Full Name *</label>
                                    <input type="text" id="input-fullname" name="Full name" required placeholder="John Smith" 
                                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm text-darkBlue focus:outline-none focus:border-darkGreen/60" />
                                </div>
                                <div class="flex flex-col gap-1.5">
                                    <label for="input-email" class="text-xs font-bold uppercase tracking-wider text-darkBlue/80">Email Address *</label>
                                    <input type="email" id="input-email" name="Email" required placeholder="john@gmail.com" 
                                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm text-darkBlue focus:outline-none focus:border-darkGreen/60" />
                                </div>
                            </div>
                            <button type="submit" class="w-full sm:w-auto px-8 py-4 bg-darkBlue hover:bg-darkGreen text-white text-sm font-bold tracking-widest uppercase rounded-full transition-colors">
                                Submit & Book Time
                            </button>
                        </form>

                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="text/javascript">
    document.addEventListener("DOMContentLoaded", function() {
        const targetForm = document.getElementById('vjc-apollo-enquiry-form');

        targetForm.addEventListener('submit', function(e) {
            e.preventDefault(); 

            // Get field values
            const name = document.getElementById('input-fullname').value;
            const email = document.getElementById('input-email').value;

            // Trigger Apollo
            if (window.ApolloMeetings) {
                window.ApolloMeetings.initWidget({
                    appId: "6a0afa099eda8700201974ad", 
                    schedulingLink: "5vl-uvk-2l5",
                    prefill: {
                        "Full name": name,
                        "Email": email
                    }
                });
                
                // Open the modal
                window.ApolloMeetings.submit();
            } else {
                console.error("Apollo widget not loaded.");
            }
        });
    });
    </script>
</body>
</html>
